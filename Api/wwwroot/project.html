<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Boardify — Проекты</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Raleway:wght@400;500;600;700;800&family=Yeseva+One&display=swap"
            rel="stylesheet"
    >

    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/project.css" />

    <script type="module" src="./js/authGuard.js"></script>
</head>

<body class="project-body">
<div class="project-app">
    <header class="project-topbar">
        <button class="project-menu-btn" id="openSidebar" aria-label="Открыть меню">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <a class="brand" style="text-decoration: none" href="./index.html" aria-label="Назад на главную">Boardify</a>

        <a class="profile-btn" href="./user.html" aria-label="Профиль">
            <svg viewBox="0 0 48 48" aria-hidden="true">
                <circle cx="24" cy="14" r="7"></circle>
                <path d="M10 38c1.2-10 7.3-15 14-15s12.8 5 14 15"></path>
            </svg>
        </a>
    </header>

    <div id="sidebarMount"></div>

    <main class="project-page">
        <section class="project-head">
            <h1>Проекты</h1>

            <button class="project-add-btn" id="openCreateProject" type="button">
                <span>＋</span>
                <span>Добавить</span>
            </button>
        </section>

        <section class="projects-grid" id="projectsGrid"></section>
    </main>

    <div class="toast" id="toast">
        <span class="toast-bell">✓</span>
        <span id="toastText">Готово</span>
    </div>

    <div class="project-modal-overlay" id="createProjectOverlay">
        <form class="project-modal" id="createProjectForm">
            <div class="project-modal-header">
                <h2>Создание проекта</h2>

                <button class="project-modal-close" id="createProjectClose" type="button" aria-label="Закрыть">
                    <span></span>
                    <span></span>
                </button>
            </div>

            <label class="project-field">
                <span>Название проекта</span>
                <input
                        class="project-input"
                        id="newProjectName"
                        type="text"
                        placeholder="Например, редизайн кабинета"
                        autocomplete="off"
                        required
                >
            </label>

            <label class="project-field">
                <span>Команда</span>
                <select class="project-select" id="newProjectTeam" required></select>
            </label>

            <div class="project-modal-actions">
                <button class="project-modal-action project-modal-cancel" id="createProjectCancel" type="button">
                    Выйти
                </button>

                <button class="project-modal-action project-modal-save is-waiting-selection" id="createProjectSubmit" type="submit" disabled>
                    Создать проект
                </button>
            </div>
        </form>
    </div>

    <div class="project-modal-overlay" id="createBoardOverlay">
        <form class="project-modal project-board-modal" id="createBoardForm">
            <div class="project-modal-header">
                <h2 id="createBoardTitle">Создание доски</h2>

                <button class="project-modal-close" id="createBoardClose" type="button" aria-label="Закрыть">
                    <span></span>
                    <span></span>
                </button>
            </div>

            <label class="project-field">
                <span>Название доски</span>
                <input
                        class="project-input"
                        id="newBoardName"
                        type="text"
                        placeholder="Например, основной канбан"
                        autocomplete="off"
                        required
                >
            </label>

            <div class="project-modal-actions">
                <button class="project-modal-action project-modal-cancel" id="createBoardCancel" type="button">
                    Выйти
                </button>

                <button class="project-modal-action project-modal-save is-waiting-selection" id="createBoardSubmit" type="submit" disabled>
                    Создать доску
                </button>
            </div>
        </form>
    </div>
</div>

<script src="./js/sidebar.js"></script>
<script type="module" src="./js/project.js"></script>
</body>
</html>
