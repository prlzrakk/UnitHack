<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
    <button class="close-btn" id="closeSidebar" aria-label="Закрыть меню">
        <span></span>
        <span></span>
    </button>

    <div class="sidebar-inner">
        <section class="sidebar-section">
            <button class="section-head" data-collapse>
                <span>Проекты</span>
                <span class="chevron"></span>
            </button>

            <div class="collapsible-content project-list">
                <button class="project-item" data-project="hackathon">
                    <span class="project-color orange"></span>
                    <span class="project-name">ХАХАТОН</span>
                    <span class="project-meta">5 участников</span>
                </button>

                <button class="project-item" data-project="vibik">
                    <span class="project-color blue"></span>
                    <span class="project-name">Vibik</span>
                    <span class="project-meta">4 участника</span>
                </button>

                <button class="project-item" data-project="blueprint">
                    <span class="project-color peach"></span>
                    <span class="project-name">Blueprint</span>
                    <span class="project-meta">5 участников</span>
                </button>
            </div>
        </section>

        <section class="sidebar-section">
            <button class="section-head" data-collapse>
                <span>Команды</span>
                <span class="chevron"></span>
            </button>

            <div class="collapsible-content team-grid">
                <button class="team-card" data-team="5-кать">
                    <span>5 кать</span>
                    <span class="team-dot blue"></span>
                </button>

                <button class="team-card" data-team="абоба">
                    <span>абоба</span>
                    <span class="team-dot orange"></span>
                </button>

                <button class="team-card" data-team="какуля">
                    <span>какуля</span>
                    <span class="team-dot peach"></span>
                </button>

                <button class="team-card" data-team="пупуня">
                    <span>пупуня</span>
                    <span class="team-dot pink"></span>
                </button>
            </div>
        </section>

        <section class="sidebar-section">
            <button class="section-head" data-collapse>
                <span>Мои задачи</span>
                <span class="chevron"></span>
            </button>

            <div class="collapsible-content my-tasks-list">
                <button class="project-item">
                    <span class="project-color orange"></span>
                    <span class="project-name">Срочные</span>
                    <span class="project-meta">2</span>
                </button>

                <button class="project-item">
                    <span class="project-color blue"></span>
                    <span class="project-name">На неделе</span>
                    <span class="project-meta">8</span>
                </button>
            </div>
        </section>
    </div>
</aside>
