<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Boardify — Kanban</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Raleway:wght@400;500;600;700;800&family=Yeseva+One&display=swap"
            rel="stylesheet"
    >
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/kanban.css" />

</head>

<body class="kanban-body">
<div class="kanban-app">
    <div id="headerMount"></div>
    <div id="sidebarMount"></div>

    <main class="kanban-page">
        <section class="kanban-main">
            <div class="kanban-head">
                <h1 id="kanbanTitle">Kanban</h1>
            </div>

            <section class="kanban-scroll" id="kanbanBoard"></section>
        </section>
    </main>

    <div class="toast" id="toast">
        <span class="toast-bell">🔔</span>
        <span id="toastText">напомнить о задании</span>
    </div>
    <div class="create-task-overlay" id="createTaskOverlay">
        <form class="create-task-modal" id="createTaskForm">
            <div class="create-task-header">
                <div class="create-task-title-area">
                    <label class="sr-only" for="newTaskTitle">Название задачи</label>
                    <input
                            class="create-task-name"
                            id="newTaskTitle"
                            type="text"
                            placeholder="Название задачи"
                            autocomplete="off"
                            required
                    >

                    <label class="sr-only" for="newTaskDescription">Описание задачи</label>
                    <textarea
                            class="create-task-description"
                            id="newTaskDescription"
                            placeholder="Описание задачи"
                    ></textarea>
                </div>

                <button class="create-task-close" id="createTaskClose" type="button" aria-label="Закрыть">
                    <span></span>
                    <span></span>
                </button>
            </div>

            <div class="create-task-body">
                <section class="create-task-block create-task-subtasks-block" aria-labelledby="createSubtasksTitle">
                    <div class="create-task-panel-head">
                        <h2 id="createSubtasksTitle">Создать подзадачу</h2>
                    </div>

                    <div class="create-subtask-list" id="createSubtaskList"></div>

                    <div class="create-subtask-add-row">
                        <label class="sr-only" for="createSubtaskInput">Название подзадачи</label>
                        <input
                                class="create-subtask-input"
                                id="createSubtaskInput"
                                type="text"
                                placeholder="Название подзадачи"
                                autocomplete="off"
                        >

                        <div
                                class="subtask-assignee-dropdown create-subtask-assignee"
                                id="createSubtaskAssignee"
                                data-subtask-assignee-dropdown
                        >
                            <button
                                    class="subtask-assignee-toggle"
                                    type="button"
                                    data-subtask-assignee-toggle
                                    aria-expanded="false"
                                    aria-label="Исполнитель подзадачи"
                            >
                                <span data-subtask-assignee-label>Сначала выбери исполнителя</span>
                                <span class="subtask-assignee-chevron" aria-hidden="true"></span>
                            </button>
                            <div class="subtask-assignee-menu" data-subtask-assignee-menu role="menu"></div>
                        </div>

                        <button class="create-subtask-add-btn" id="createSubtaskAdd" type="button" aria-label="Добавить подзадачу">
                            +
                        </button>
                    </div>
                </section>

                <section class="create-task-block create-task-settings-block">
                    <label class="create-row create-assignee-row">
                        <span class="create-row-label">Исполнитель</span>

                        <div class="assignee-picker">
                            <input
                                    class="create-select-like"
                                    id="newTaskAssigneeSearch"
                                    type="text"
                                    placeholder="Поиск участника"
                                    autocomplete="off"
                            >

                            <div class="assignee-options" id="assigneeOptions"></div>
                        </div>

                        <div class="selected-assignees" id="selectedAssignees"></div>
                    </label>

                    <label class="create-row">
                        <span class="create-row-label">Приоритет</span>

                        <input type="hidden" id="newTaskPriority" value="MID">

                        <div class="kanban-select-dropdown" data-kanban-select="newTaskPriority">
                            <button
                                    class="kanban-select-toggle"
                                    type="button"
                                    aria-expanded="false"
                            >
                                <span data-kanban-select-label>MID</span>
                                <span class="kanban-select-chevron"></span>
                            </button>

                            <div class="kanban-select-menu" role="menu">
                                <button
                                        class="kanban-select-option"
                                        type="button"
                                        data-value="LOW"
                                >
                                    LOW
                                </button>

                                <button
                                        class="kanban-select-option is-selected"
                                        type="button"
                                        data-value="MID"
                                >
                                    MID
                                </button>

                                <button
                                        class="kanban-select-option"
                                        type="button"
                                        data-value="HIGH"
                                >
                                    HIGH
                                </button>
                            </div>
                        </div>
                    </label>

                    <label class="create-row">
                        <span class="create-row-label">Сложность</span>

                        <input type="hidden" id="newTaskComplexity" value="2 часа">

                        <div class="kanban-select-dropdown" data-kanban-select="newTaskComplexity">
                            <button class="kanban-select-toggle" type="button" aria-expanded="false">
                                <span data-kanban-select-label>2 часа</span>
                                <span class="kanban-select-chevron"></span>
                            </button>

                            <div class="kanban-select-menu" role="menu">
                                <button class="kanban-select-option" type="button" data-value="30 мин">30 мин</button>
                                <button class="kanban-select-option" type="button" data-value="1 час">1 час</button>
                                <button class="kanban-select-option is-selected" type="button" data-value="2 часа">2 часа</button>
                                <button class="kanban-select-option" type="button" data-value="3 часа">3 часа</button>
                                <button class="kanban-select-option" type="button" data-value="4 часа">4 часа</button>
                                <button class="kanban-select-option" type="button" data-value="6 часов">6 часов</button>
                                <button class="kanban-select-option" type="button" data-value="8 часов">8 часов</button>
                            </div>
                        </div>
                    </label>

                    <label class="create-row create-deadline-row">
                        <span class="create-row-label">Дедлайн</span>

                        <input
                                class="create-date-time"
                                id="newTaskDeadline"
                                type="datetime-local"
                        >
                    </label>

                    <label class="create-row create-tags-row">
                        <span class="create-row-label">Теги</span>

                        <div class="create-tags-box">
                            <div class="created-tags" id="createdTags"></div>

                            <div class="tag-create-row">
                                <input
                                        class="create-input-small"
                                        id="newTaskTagInput"
                                        type="text"
                                        placeholder="Добавить тег"
                                        autocomplete="off"
                                >
                                <button class="tag-add-btn" id="addTaskTagBtn" type="button">+</button>
                            </div>
                        </div>
                    </label>
                </section>
            </div>

            <div class="create-task-actions">
                <button class="create-action create-cancel" id="createTaskCancel" type="button">
                    Выйти без сохранения
                </button>

                <button class="create-action create-save" type="submit">
                    Создать задачу
                </button>
            </div>
        </form>
    </div>

    <div class="task-detail-overlay" id="taskDetailOverlay" aria-hidden="true">
        <form class="task-detail-modal" id="taskDetailForm">
            <div class="task-detail-head">
                <div class="task-detail-title-area">
                    <label class="sr-only" for="detailTaskTitle">Название задачи</label>
                    <input
                            class="task-detail-title"
                            id="detailTaskTitle"
                            type="text"
                            placeholder="Название задачи"
                            autocomplete="off"
                            required
                    >

                    <label class="sr-only" for="detailTaskDescription">Описание задачи</label>
                    <textarea
                            class="task-detail-description"
                            id="detailTaskDescription"
                            placeholder="Описание задачи"
                    ></textarea>
                </div>

                <button class="task-detail-close" id="taskDetailClose" type="button" aria-label="Закрыть">
                    <span></span>
                    <span></span>
                </button>
            </div>

            <div class="task-detail-content">
                <section class="task-detail-panel task-detail-subtasks" aria-labelledby="taskDetailSubtasksTitle">
                    <div class="task-detail-panel-head">
                        <h2 id="taskDetailSubtasksTitle">Создать подзадачу</h2>
                    </div>

                    <div class="subtask-list" id="detailSubtaskList"></div>

                    <div class="subtask-add-row">
                        <label class="sr-only" for="detailSubtaskInput">Название подзадачи</label>
                        <input
                                class="subtask-input"
                                id="detailSubtaskInput"
                                type="text"
                                placeholder="Название подзадачи"
                                autocomplete="off"
                        >
                        <button class="subtask-add-btn" id="detailSubtaskAdd" type="button" aria-label="Добавить подзадачу">
                            +
                        </button>
                    </div>
                </section>

                <section class="task-detail-panel task-detail-fields" aria-label="Параметры задачи">
                    <div class="task-detail-field">
                        <span class="task-detail-label">Исполнитель:</span>
                        <div class="task-detail-assignee">
                            <img src="components/images/user.svg" alt="">
                            <span id="detailTaskAssignee">Не назначен</span>
                        </div>
                    </div>

                    <label class="task-detail-field" for="detailTaskPriority">
                        <span class="task-detail-label">Приоритет:</span>
                        <input type="hidden" id="detailTaskPriority" value="Medium">

                        <div class="kanban-select-dropdown detail-kanban-select" data-kanban-select="detailTaskPriority">
                            <button class="kanban-select-toggle" type="button" aria-expanded="false">
                                <span data-kanban-select-label>Средний</span>
                                <span class="kanban-select-chevron"></span>
                            </button>

                            <div class="kanban-select-menu" role="menu">
                                <button class="kanban-select-option" type="button" data-value="Low">Низкий</button>
                                <button class="kanban-select-option is-selected" type="button" data-value="Medium">Средний</button>
                                <button class="kanban-select-option" type="button" data-value="High">Высокий</button>
                            </div>
                        </div>
                    </label>

                    <label class="task-detail-field" for="detailTaskComplexity">
                        <span class="task-detail-label">Сложность:</span>
                        <input type="hidden" id="detailTaskComplexity" value="">

                        <div class="kanban-select-dropdown detail-kanban-select" data-kanban-select="detailTaskComplexity">
                            <button class="kanban-select-toggle" type="button" aria-expanded="false">
                                <span data-kanban-select-label>Выбрать сложность</span>
                                <span class="kanban-select-chevron"></span>
                            </button>

                            <div class="kanban-select-menu" role="menu">
                                <button class="kanban-select-option is-selected" type="button" data-value="">Выбрать сложность</button>
                                <button class="kanban-select-option" type="button" data-value="30 мин">30 мин</button>
                                <button class="kanban-select-option" type="button" data-value="1 час">1 час</button>
                                <button class="kanban-select-option" type="button" data-value="2 часа">2 часа</button>
                                <button class="kanban-select-option" type="button" data-value="3 часа">3 часа</button>
                                <button class="kanban-select-option" type="button" data-value="4 часа">4 часа</button>
                                <button class="kanban-select-option" type="button" data-value="6 часов">6 часов</button>
                                <button class="kanban-select-option" type="button" data-value="8 часов">8 часов</button>
                            </div>
                        </div>
                    </label>

                    <label class="task-detail-field" for="detailTaskDeadline">
                        <span class="task-detail-label">Дедлайн:</span>
                        <input class="task-detail-date" id="detailTaskDeadline" type="datetime-local">
                    </label>
                </section>
            </div>

            <div class="task-detail-actions">
                <button class="task-detail-action task-detail-cancel" id="taskDetailCancel" type="button">
                    <span class="task-detail-action-icon" aria-hidden="true">×</span>
                    <span>Выйти без сохранения</span>
                </button>

                <button class="task-detail-action task-detail-save" type="submit">
                    <span class="task-detail-action-icon" aria-hidden="true">✓</span>
                    <span>Сохранить изменения</span>
                </button>
            </div>
        </form>
    </div>

    <div class="reminder-modal" id="reminderModal">
        <div class="reminder-window">
            <button class="reminder-close" id="reminderClose" aria-label="Закрыть">
                <span></span>
                <span></span>
            </button>

            <div class="reminder-icon">🔔</div>

            <h2 class="reminder-title">Напомнить о задаче?</h2>

            <p class="reminder-text" id="reminderText">
                Напомнить выбранному пользователю о задаче?
            </p>

            <div class="reminder-actions">
                <button class="reminder-btn reminder-no" id="reminderNo">Нет</button>
                <button class="reminder-btn reminder-yes" id="reminderYes">Да</button>
            </div>
        </div>
    </div>
</div>
<script type="module" src="./js/authGuard.js"></script>
<script src="./js/sidebar.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
<script src="./js/api/notificationConnection.js"></script>
<script type="module" src="./js/header.js"></script>
<script type="module" src="./js/kanban.js"></script>
</body>
</html>
