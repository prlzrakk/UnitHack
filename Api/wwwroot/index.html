<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boardify — Ближайшие задачи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Raleway:wght@400;500&family=Yeseva+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/header.css" />
</head>
<body>
  <main class="app">
    <div id="headerMount"></div>
    <div id="sidebarMount"></div>
    <section class="matrix-section" aria-label="Матрица ближайших задач">
      <div class="matrix-layout">
        <div class="y-axis">
          <span class="axis-label axis-label-top">Важно</span>
          <span class="axis-label axis-label-bottom">Не важно</span>
        </div>

        <div class="matrix-content">
          <div class="matrix-grid" id="taskMatrix"></div>

          <div class="x-axis">
            <span>Не срочно</span>
            <span>Срочно</span>
          </div>

          <h1 class="page-title">Ближайшие задачи</h1>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="./js/authGuard.js"></script>
  <script src="./js/sidebar.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script src="./js/api/notificationConnection.js"></script>
  <script type="module" src="./js/header.js"></script>
  <script type="module" src="./js/script.js"></script>
</body>
</html>
