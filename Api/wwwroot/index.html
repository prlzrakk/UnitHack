<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boardify — Ближайшие задачи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Raleway:wght@400;500&family=Yeseva+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="openSidebar" aria-label="Открыть меню"><span></span><span></span><span></span></button>
      <div class="brand">Boardify</div>
      <button class="icon-btn profile-btn" aria-label="Профиль">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <circle cx="24" cy="14" r="7"></circle>
          <path d="M10 38c1.2-10 7.3-15 14-15s12.8 5 14 15"></path>
        </svg>
      </button>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <button class="close-btn" id="closeSidebar" aria-label="Закрыть меню">
        <span></span>
        <span></span>
      </button>

      <div class="sidebar-inner">
<!--        <section class="sidebar-section activity-section">-->
<!--          <h2 class="sidebar-title">Активность</h2>-->

<!--          <svg class="activity-chart" viewBox="0 0 420 160" fill="none">-->
<!--            <path-->
<!--                    d="M12 120L58 74L126 120L154 58L224 94L258 18L306 94L354 120L404 130"-->
<!--                    stroke="white"-->
<!--                    stroke-width="6"-->
<!--                    stroke-linecap="square"-->
<!--                    stroke-linejoin="miter"-->
<!--            />-->
<!--          </svg>-->
<!--        </section>-->

        <section class="sidebar-section">
          <button class="section-head" data-collapse>
            <span>Проекты</span>
            <span class="chevron"></span>
          </button>

          <div class="collapsible-content project-list">
            <button class="project-item active">
              <span class="project-color orange"></span>
              <span class="project-name">ХАХАТОН</span>
              <span class="project-meta active-meta">active</span>
            </button>

            <button class="project-item">
              <span class="project-color blue"></span>
              <span class="project-name">Vibik</span>
              <span class="project-meta">4 участника</span>
            </button>

            <button class="project-item">
              <span class="project-color peach"></span>
              <span class="project-name">Blueprint</span>
              <span class="project-meta">5 участников</span>
            </button>
          </div>
        </section>

        <section class="sidebar-section">
          <button class="section-head" data-collapse>
            <span>Команды</span>
            <span class="chevron"></span>
          </button>

          <div class="collapsible-content team-grid">
            <button class="team-card">
              <span>5 кать</span>
              <span class="team-dot blue"></span>
            </button>

            <button class="team-card">
              <span>абоба</span>
              <span class="team-dot orange"></span>
            </button>

            <button class="team-card">
              <span>какуля</span>
              <span class="team-dot peach"></span>
            </button>

            <button class="team-card">
              <span>пупуня</span>
              <span class="team-dot pink"></span>
            </button>
          </div>
        </section>

        <section class="sidebar-section">
          <button class="section-head" data-collapse>
            <span>Мои задачи</span>
            <span class="chevron"></span>
          </button>

          <div class="collapsible-content my-tasks-list">
            <button class="project-item">
              <span class="project-color orange"></span>
              <span class="project-name">Срочные</span>
              <span class="project-meta">2</span>
            </button>

            <button class="project-item">
              <span class="project-color blue"></span>
              <span class="project-name">На неделе</span>
              <span class="project-meta">8</span>
            </button>
          </div>
        </section>
      </div>
    </aside>
    <section class="matrix-section" aria-label="Матрица ближайших задач">
      <div class="matrix-layout">
        <div class="y-axis">
          <span class="axis-label axis-label-top">Важно</span>
          <span class="axis-label axis-label-bottom">Не важно</span>
        </div>

        <div class="matrix-content">
          <div class="matrix-grid" id="taskMatrix"></div>

          <div class="x-axis">
            <span>Не срочно</span>
            <span>Срочно</span>
          </div>

          <h1 class="page-title">Ближайшие задачи</h1>
        </div>
      </div>
    </section>
  </main>
  <script src="./js/script.js"></script>
</body>
</html>
